# Workflow de CI/CD: construye la imagen Docker y la publica en ghcr.io
# (GitHub Container Registry) cada vez que haces push a la rama main.
name: build-and-push

# Cuando se dispara este workflow.
on:
  push:
    branches: [main]
  # Permite dispararlo a mano desde la pestania Actions de GitHub.
  workflow_dispatch:

# Permisos que necesita el "robot" para poder publicar en ghcr.io.
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest   # GitHub nos presta una maquina Linux limpia

    steps:
      # 1. Baja tu codigo al runner.
      - name: Checkout del codigo
        uses: actions/checkout@v4

      # 2. Inicia sesion en ghcr.io usando un token que GitHub genera solo.
      #    No tenes que crear ninguna contrasena: GITHUB_TOKEN es automatico.
      - name: Login en ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Prepara Buildx (el constructor moderno de imagenes de Docker).
      - name: Preparar Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Construye la imagen y la empuja a ghcr.io con dos etiquetas:
      #    :latest  -> siempre la ultima
      #    :<sha>   -> el commit exacto (util para volver atras)
      - name: Build y push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          # Cache para que builds futuros sean mas rapidos.
          cache-from: type=gha
          cache-to: type=gha,mode=max
